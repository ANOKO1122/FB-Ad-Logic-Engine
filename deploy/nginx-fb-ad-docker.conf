# 用于独立 Nginx 容器：对外映射宿主机端口（当前已切到 80:80）
# 静态页：挂载本仓库 dist -> /usr/share/nginx/html
# API：反代到「宿主机」上跑的 Node（默认 3001），需配合 --add-host=host.docker.internal:host-gateway

server {
    listen 80;
    server_name _;
    # Docker 内置 DNS；用变量延迟解析上游，避免 oauth2-proxy 未启动时 Nginx 启动失败。
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $oauth2_upstream http://oauth2-proxy:4180;

    root /usr/share/nginx/html;
    index index.html;

    # 预留 OAuth2 路由：统一由 oauth2-proxy 处理登录、回调与登出。
    # 当前阶段先打通路径，不立刻对全站强制 auth_request，避免在无密钥时影响访问。
    location /oauth2/ {
        proxy_pass $oauth2_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # 预留认证子请求端点（给未来 auth_request 使用）。
    location = /oauth2/auth {
        internal;
        proxy_pass $oauth2_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # 默认 bridge 下 127.0.0.11 常不可用，host.docker.internal 会超时。
    # 宿主机上 Node 监听 0.0.0.0:3001 时，用 docker0 网关 IP 即可（多数为 172.17.0.1；若不对：ip -4 addr show docker0）。
    location /api/ {
        # 后续启用 auth_request 时，建议开启以下三行并将用户名统一转发给后端：
        # auth_request /oauth2/auth;
        # auth_request_set $auth_user $upstream_http_x_auth_request_user;
        # proxy_set_header X-Forwarded-User $auth_user;
        proxy_pass http://172.17.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 50m;
}
