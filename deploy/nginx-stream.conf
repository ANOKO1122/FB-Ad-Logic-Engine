# SNI-based TCP stream routing for port 443
# Routes HTTPS webhook traffic to support system, everything else to s-ui proxy
#
# ssl_preread reads TLS ClientHello SNI without terminating TLS.
# Supports standard TLS and VLESS Reality (which uses real TLS 1.3 ClientHello).

stream {
    # SNI → backend mapping
    map $ssl_preread_server_name $stream_backend {
        server.clientservice-center.com  support_https;
        default                          sui_proxy;
    }

    # support-nginx HTTPS (host port 8443 → container 443)
    upstream support_https {
        server 172.17.0.1:8443;
    }

    # s-ui proxy (after we move it to port 444)
    upstream sui_proxy {
        server 172.17.0.1:444;
    }

    server {
        listen 443;
        ssl_preread on;
        proxy_pass $stream_backend;
        proxy_connect_timeout 10s;
        proxy_timeout 600s;
    }
}
