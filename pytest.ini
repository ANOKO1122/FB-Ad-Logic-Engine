[pytest]
# pytest 配置文件
# 参考：https://docs.pytest.org/en/stable/reference/reference.html#configuration-options

# 测试文件匹配模式
python_files = test_*.py *_test.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记（markers）
markers =
    api: API 接口测试
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试（可能需要跳过）

# 测试路径（可选）
# testpaths = tests
